<!DOCTYPE html>
<html>
<head>
    <title>Lobby</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="center">
    <div class="card">
        <h2>AI Video Conference</h2>
        <button onclick="createRoom()">Create Room</button>
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div class="popup-overlay" id="popup">
        <div class="popup">
            <h3 id="popupTitle">Enter Details</h3>
            <input type="text" id="nameInput" placeholder="Your name">
            <input type="text" id="roomInput" placeholder="Room ID" style="display:none;">
            <div class="popup-actions">
                <button onclick="submitPopup()">Continue</button>
                <button class="secondary" onclick="closePopup()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let mode = ""; // create / join

        function createRoom(){
            mode = "create";
            document.getElementById('popupTitle').innerText = "Create Room";
            document.getElementById('roomInput').style.display = "none";
            openPopup();
        }

        function joinRoom(){
            mode = "join";
            document.getElementById('popupTitle').innerText = "Join Room";
            document.getElementById('roomInput').style.display = "block";
            openPopup();
        }

        function openPopup(){
            document.getElementById('popup').style.display = "flex";
            document.getElementById('nameInput').focus();
        }

        function closePopup(){
            document.getElementById('popup').style.display = "none";
        }

        function submitPopup(){
            const name = document.getElementById('nameInput').value.trim();
            const roomInput = document.getElementById('roomInput').value.trim();

            if(!name){
                alert("Name is required");
                return;
            }

            let room = roomInput;
            let role = "participant"; // Default role

            if(mode === "create"){
                room = Math.random().toString(36).substr(2,6);
                role = "moderator"; // Pembuat room otomatis jadi moderator
            }

            if(mode === "join" && !room){
                alert("Room ID is required");
                return;
            }

            // Arahkan ke meeting room beserta role-nya
            location.href = `meeting.html?name=${name}&room=${room}&role=${role}`;
        }

        // Enter key support
        document.addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                const popup = document.getElementById('popup');
                if(popup.style.display === "flex"){
                    submitPopup();
                }
            }
        });
    </script>
</body>
</html>
