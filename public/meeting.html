<!DOCTYPE html>
<html>
<head>
    <title>Meeting Room</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <h3 id="info"></h3>
    
    <div id="videos"></div>

    <div id="controls">
        <button id="micBtn" class="control-btn" title="Mute/Unmute">
            <i class="fas fa-microphone"></i>
        </button>
        <button id="camBtn" class="control-btn" title="Camera On/Off">
            <i class="fas fa-video"></i>
        </button>
        <button id="shareBtn" class="control-btn" title="Share Screen">
            <i class="fas fa-desktop"></i>
        </button>
        <button id="leaveBtn" class="control-btn leave-btn" title="End Call">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>

    <script src="meeting.js"></script>
</body>
</html>
